<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地 LLM 記憶體需求計算機</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .result-box { background: #eef2f5; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .total { font-size: 1.5em; font-weight: bold; color: #e74c3c; margin-top: 10px; }
        .hardware { font-weight: bold; color: #27ae60; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>本地 LLM 記憶體需求計算機</h2>
    
    <div class="form-group">
        <label>模型參數大小 (Billion): <span id="modelSizeVal">32</span>B</label>
        <input type="range" id="modelSize" min="1" max="100" value="32" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>量化壓縮等級</label>
        <select id="quantization" onchange="calculate()">
            <option value="4">4-bit (推薦日常使用)</option>
            <option value="8">8-bit (高精度)</option>
            <option value="16">16-bit (無壓縮)</option>
        </select>
    </div>

    <div class="form-group">
        <label>記憶長度 (Context Window)</label>
        <select id="contextSize" onchange="calculate()">
            <option value="4096">4k</option>
            <option value="8192">8k</option>
            <option value="16384">16k</option>
            <option value="32768" selected>32k</option>
            <option value="65536">64k</option>
            <option value="128000">128k</option>
        </select>
    </div>

    <div class="result-box">
        <p>模型本體佔用: <span id="weightMem">0</span> GB</p>
        <p>對話記憶佔用 (KV Cache): <span id="ctxMem">0</span> GB</p>
        <div class="total">總需求: <span id="totalMem">0</span> GB VRAM</div>
        <div class="hardware" id="recommendation"></div>
    </div>
</div>

<script>
    function calculate() {
        let size = parseFloat(document.getElementById('modelSize').value);
        let quant = parseFloat(document.getElementById('quantization').value);
        let ctx = parseFloat(document.getElementById('contextSize').value);

        document.getElementById('modelSizeVal').innerText = size;

        // 計算模型本體佔用 (Model Weights)
        let weight = (size * quant / 8) * 1.1; 
        
        // 計算對話記憶佔用 (Context Memory)
        let contextMem = (ctx / 8192) * (size / 10);

        let total = weight + contextMem;

        document.getElementById('weightMem').innerText = weight.toFixed(1);
        document.getElementById('ctxMem').innerText = contextMem.toFixed(1);
        document.getElementById('totalMem').innerText = total.toFixed(1);

        let rec = "";
        if (total < 10) {
            rec = "推薦配置：入門級 PC 配 RTX 3060/4060 (12GB) 或 Mac 16GB";
        } else if (total < 22) {
            rec = "推薦配置：高階 PC 配 RTX 3090/4090 (24GB) 或 Mac 32GB";
        } else if (total < 45) {
            rec = "推薦配置：Mac Studio/Mini (64GB) 或 PC 雙插 3090/4090 (48GB)";
        } else {
            rec = "推薦配置：Mac Studio (128GB+) 或 伺服器級多卡陣列";
        }
        document.getElementById('recommendation').innerText = rec;
    }

    // 初始化計算
    calculate();
</script>

</body>
</html>
